<script>
// ── PARTICLES ──
requestAnimationFrame(function() {
  var container = document.getElementById('particles');
  var isMobile = window.matchMedia('(max-width: 767px)').matches;
  var count = isMobile ? 8 : 18;
  var frag = document.createDocumentFragment();
  for (var i = 0; i < count; i++) {
    var p = document.createElement('span');
    p.className = 'particle';
    var size  = 1 + Math.random() * 3;
    var drift = (Math.random() - 0.5) * 120;
    var dur   = 18 + Math.random() * 22;
    var delay = -(Math.random() * 40);
    var op    = 0.06 + Math.random() * 0.14;
    p.style.cssText = [
      'left:' + (Math.random() * 100) + '%',
      'width:' + size + 'px',
      'height:' + size + 'px',
      '--drift:' + drift + 'px',
      '--op:' + op,
      'animation-duration:' + dur + 's',
      'animation-delay:' + delay + 's',
      'opacity:' + op
    ].join(';');
    frag.appendChild(p);
  }
  container.appendChild(frag);
});

// ── ENTRANCE SEQUENCE ──
(function() {
  var TRANSITION = 'opacity 2.4s cubic-bezier(0.16,1,0.3,1), transform 2.4s cubic-bezier(0.16,1,0.3,1)';

  // Keep all non-title elements invisible until after the eyes open
  ['e5','e6','e7','e7b','e8'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.style.opacity = '0';
    el.style.transform = 'translateY(24px)';
    el.style.transition = 'none';
  });

  // Title: hidden behind eyelids, positioned at center, ready to float up
  var wrap = document.getElementById('e2');
  if (wrap) {
    wrap.classList.remove('e');
    wrap.style.opacity = '1';
    wrap.style.filter = 'blur(6px)';
    var rect = wrap.getBoundingClientRect();
    var offset = (window.innerHeight / 2) - (rect.top + rect.height / 2);
    wrap.style.transform = 'translateY(' + Math.round(offset) + 'px)';
  }

  // Step 1 — brief pause, then open the eyelids (eyes opening)
  setTimeout(function() {
    var top = document.getElementById('eyelid-top');
    var bot = document.getElementById('eyelid-bottom');
    if (top) top.classList.add('open');
    if (bot) bot.classList.add('open');
  }, 400);

  // Step 2 — as eyes finish opening, Wake Up floats up and sharpens
  // Eyelid transition is 2.2s; start float slightly before fully open for overlap
  setTimeout(function() {
    if (wrap) {
      wrap.style.transition = 'transform 1.8s cubic-bezier(0.16,1,0.3,1), filter 2.0s ease';
      wrap.style.transform = 'translateY(0)';
      wrap.style.filter = 'blur(0)';
    }
    // Remove eyelids from the DOM after they've fully slid away
    setTimeout(function() {
      var top = document.getElementById('eyelid-top');
      var bot = document.getElementById('eyelid-bottom');
      if (top) top.style.display = 'none';
      if (bot) bot.style.display = 'none';
    }, 2400);
  }, 1800);

  // Step 3 — other elements drift in top to bottom after Wake Up settles
  [
    { id: 'e5',  delay: 3800 },
    { id: 'e6',  delay: 4300 },
    { id: 'e7',  delay: 4800 },
    { id: 'e7b', delay: 5100 },
    { id: 'e8',  delay: 5500 },
  ].forEach(function(item) {
    setTimeout(function() {
      var el = document.getElementById(item.id);
      if (!el) return;
      el.classList.add('in');
      el.style.transition = TRANSITION;
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        });
      });
    }, item.delay);
  });

  // Step 4 — feather fades in last, after pre-save appears
  setTimeout(function() {
    var bg = document.querySelector('.hero-bg');
    if (bg) bg.classList.add('visible');
  }, 6200);
})();

// ── PAGE TRANSITIONS ──
(function() {
  var CLOSE_MS = 650;
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a[href]');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href || href[0] === '#' || a.target === '_blank' ||
        /^https?:\/\//.test(href)) return;
    e.preventDefault();
    var top = document.getElementById('eyelid-top');
    var bot = document.getElementById('eyelid-bottom');
    if (!top || !bot) { window.location.href = href; return; }
    top.style.display = bot.style.display = '';
    top.style.transition = bot.style.transition = 'none';
    top.classList.add('open'); bot.classList.add('open');
    void top.offsetWidth;
    top.style.transition = bot.style.transition =
      'transform ' + CLOSE_MS + 'ms cubic-bezier(0.85, 0, 0.15, 1)';
    top.classList.remove('open'); bot.classList.remove('open');
    setTimeout(function() { window.location.href = href; }, CLOSE_MS + 60);
  });
})();

// ── COUNTDOWN ──
function updateCountdown() {
  var target = new Date('2026-07-04T00:00:00');
  var now    = new Date();
  var diff   = target - now;
  if (diff <= 0) {
    ['cd-d','cd-h','cd-m','cd-s'].forEach(function(id) {
      document.getElementById(id).textContent = '00';
    });
    return;
  }
  var d = Math.floor(diff / 86400000);
  var h = Math.floor((diff % 86400000) / 3600000);
  var m = Math.floor((diff % 3600000)  / 60000);
  var s = Math.floor((diff % 60000)    / 1000);
  document.getElementById('cd-d').textContent = String(d).padStart(2, '0');
  document.getElementById('cd-h').textContent = String(h).padStart(2, '0');
  document.getElementById('cd-m').textContent = String(m).padStart(2, '0');
  document.getElementById('cd-s').textContent = String(s).padStart(2, '0');
}
updateCountdown();
setInterval(updateCountdown, 1000);

// ── HIDDEN MESSAGE SYNC: know only shows when truth is also showing ──
(function() {
  var rw2 = document.querySelector('.rw2');
  if (!rw2) return;
  var duration = 22000; // matches rB 22s
  var delay    = 8500;  // matches -8.5s offset
  var visStart = 0.30;  // rB visible from 30%
  var visEnd   = 0.402; // rB visible to 40.2%
  var t0 = performance.now();
  function tick() {
    var pos = ((performance.now() - t0 + delay) % duration) / duration;
    rw2.classList.toggle('truth-visible', pos >= visStart && pos <= visEnd);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

// ── HAMBURGER MENU ──
(function() {
  var nav = document.getElementById('site-nav');
  var btn = document.getElementById('nav-hamburger');
  if (!btn || !nav) return;
  btn.addEventListener('click', function() {
    var open = nav.classList.toggle('nav-open');
    btn.setAttribute('aria-expanded', String(open));
  });
  nav.querySelectorAll('.nav-links a').forEach(function(a) {
    a.addEventListener('click', function() {
      nav.classList.remove('nav-open');
      btn.setAttribute('aria-expanded', 'false');
    });
  });
})();

// ── SCROLL REVEAL ──
var revealObserver = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (!entry.isIntersecting) return;
    var items = entry.target.querySelectorAll('[data-reveal]');
    items.forEach(function(el, i) {
      setTimeout(function() { el.classList.add('visible'); }, i * 150);
    });
    revealObserver.unobserve(entry.target);
  });
}, { threshold: 0.1 });

document.querySelectorAll('[data-section]').forEach(function(s) {
  revealObserver.observe(s);
});
</script>

<script>
  /* ── WAKE UP dream letters ── */
  (function() {
    function splitLetters(el) {
      var words = el.textContent.trim().split(' ');
      el.innerHTML = '';
      words.forEach(function(word, wi) {
        var wSpan = document.createElement('span');
        wSpan.style.cssText = 'display:inline-block;white-space:nowrap;';
        word.split('').forEach(function(ch) {
          var s = document.createElement('span');
          s.textContent = ch;
          s.className = 'letter';
          var dur = (3.5 + Math.random()*4.5).toFixed(2);
          var del = (-Math.random()*8).toFixed(2);
          var blr = (0.8 + Math.random()*2.2).toFixed(2);
          var op  = (0.7 + Math.random()*0.25).toFixed(3);
          var ty  = (-0.5 + Math.random()*1.5).toFixed(2);
          var sc  = (0.978 + Math.random()*0.03).toFixed(4);
          s.style.cssText = '--dur:'+dur+'s;--del:'+del+'s;--blr:'+blr+'px;--op:'+op+';--ty:'+ty+'px;--sc:'+sc+';';
          wSpan.appendChild(s);
        });
        el.appendChild(wSpan);
        if (wi < words.length - 1) {
          var sp = document.createElement('span'); sp.style.cssText = 'display:inline-block;width:0.22em;'; el.appendChild(sp);
        }
      });
    }
    var title = document.querySelector('.hero-title');
    var ghost = document.querySelector('.hero-title-ghost');
    if (title) splitLetters(title);
    if (ghost) splitLetters(ghost);
  })();
</script>
