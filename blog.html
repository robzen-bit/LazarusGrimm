<script>
// ── NAV LOGO ──
(function() {
  var s = document.querySelector('.sigil-large') || document.querySelector('.hero-sigil');
  var n = document.getElementById('nav-logo');
  if (s && n) n.src = s.src;
})();

// ── EYELID OPEN (page entrance) ──
(function() {
  var top = document.getElementById('eyelid-top');
  var bot = document.getElementById('eyelid-bottom');
  if (!top || !bot) return;
  setTimeout(function() {
    top.classList.add('open');
    bot.classList.add('open');
    setTimeout(function() {
      top.style.display = 'none';
      bot.style.display = 'none';
    }, 2500);
  }, 350);
})();

// ── PAGE TRANSITIONS ──
(function() {
  var CLOSE_MS = 650;
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a[href]');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href || href[0] === '#' || a.target === '_blank' ||
        /^https?:\/\//.test(href)) return;
    var destPage = href.split('#')[0];
    if (!destPage || destPage === window.location.pathname.split('/').pop()) return;
    e.preventDefault();
    var top = document.getElementById('eyelid-top');
    var bot = document.getElementById('eyelid-bottom');
    if (!top || !bot) { window.location.href = href; return; }
    top.style.display = bot.style.display = '';
    top.style.transition = bot.style.transition = 'none';
    top.classList.add('open'); bot.classList.add('open');
    void top.offsetWidth;
    top.style.transition = bot.style.transition =
      'transform ' + CLOSE_MS + 'ms cubic-bezier(0.85, 0, 0.15, 1)';
    top.classList.remove('open'); bot.classList.remove('open');
    setTimeout(function() { window.location.href = href; }, CLOSE_MS + 60);
  });
})();
</script>

<script>
// ── HAMBURGER MENU ──
(function() {
  var nav = document.getElementById('site-nav');
  var btn = document.getElementById('nav-hamburger');
  if (!btn || !nav) return;
  btn.addEventListener('click', function() {
    var open = nav.classList.toggle('nav-open');
    btn.setAttribute('aria-expanded', String(open));
  });
  nav.querySelectorAll('.nav-links a:not(.nav-has-dropdown a)').forEach(function(a) {
    a.addEventListener('click', function() {
      nav.classList.remove('nav-open');
      btn.setAttribute('aria-expanded', 'false');
    });
  });
  // Mobile Lyrics dropdown toggle
  nav.querySelectorAll('.nav-has-dropdown > a').forEach(function(a) {
    a.addEventListener('click', function(e) {
      if (window.innerWidth > 520) return;
      e.preventDefault();
      var li = a.closest('.nav-has-dropdown');
      li.classList.toggle('mobile-open');
    });
  });
})();
</script>
